---
- name: Deploy FamilyFood application
  hosts: all
  become: no

  vars_files:
    - ../ansible/inventories/production/group_vars/all.yml
    - ../ansible/vars/secrets.yml

  vars:
    repo_url: "https://github.com/andrew72ru/familyFood.git"
    deploy_root: "/var/www/{{ app_name }}"
    releases_dir: "{{ deploy_root }}/releases"
    shared_dir: "{{ deploy_root }}/shared"
    current_dir: "{{ deploy_root }}/current"
    app_root: "{{ current_dir }}"
    release_path: "{{ releases_dir }}/{{ release_timestamp }}"
    keep_releases: 5

  tasks:
    - name: Set stable release timestamp
      set_fact:
        release_timestamp: "{{ lookup('pipe', 'date +%Y%m%d%H%M%S') }}"
      run_once: true

    - name: Ensure deployment and shared directories exist
      ansible.builtin.file:
        path: "{{ item.path }}"
        state: directory
        owner: "{{ ansible_user }}"
        group: www-data
        mode: "{{ item.mode | default('0775') }}"
        recurse: "{{ item.recurse | default(omit) }}"
      loop:
        - { path: "{{ releases_dir }}" }
        - { path: "{{ shared_dir }}" }
        - { path: "{{ deploy_root }}/var", mode: '0775' }
        - { path: "{{ deploy_root }}/var/log", mode: '0777', recurse: yes }
      become: yes

    - name: Set ACLs on shared var directory
      ansible.builtin.acl:
        path: "{{ deploy_root }}/var"
        entity: "{{ item }}"
        etype: user
        permissions: rwx
        state: present
        recursive: yes
      loop:
        - "{{ ansible_user }}"
        - www-data
      become: yes

    - name: Set default ACLs on shared var directory
      ansible.builtin.acl:
        path: "{{ deploy_root }}/var"
        entity: "{{ item }}"
        etype: user
        permissions: rwx
        state: present
        default: yes
      loop:
        - "{{ ansible_user }}"
        - www-data
      become: yes

    - name: Clone source code from GitHub
      ansible.builtin.git:
        repo: "{{ repo_url }}"
        dest: "{{ release_path }}"
        version: main
        accept_hostkey: yes

    - name: Create shared Symfony .env.local
      ansible.builtin.copy:
        content: |
          APP_ENV=prod
          APP_SECRET={{ app_secret }}
          DATABASE_URL="postgresql://{{ db_user }}:{{ db_password }}@127.0.0.1:5432/{{ db_name }}?serverVersion={{ postgresql_version }}&charset=utf8"
          MESSENGER_TRANSPORT_DSN=doctrine://default?auto_setup=0
          CORS_ALLOW_ORIGIN='^https?://{{ app_domain | replace('.', '\.') }}(:[0-9]+)?$'
          JWT_SECRET_KEY={{ jwt_private_key }}
          JWT_PUBLIC_KEY={{ jwt_public_key }}
          JWT_PASSPHRASE={{ jwt_passphrase }}
          OPENAI_KEY={{ openapi_key }}
          OPENAI_PROMPT={{ openapi_prompt }}
          OPENAI_PROMPT_VERSION={{ openapi_prompt_version }}
          OPENAI_EXTRACT_PROMPT={{ openapi_extract_prompt }}
          OPENAI_EXTRACT_PROMPT_VERSION={{ openapi_extract_prompt_version }}
          MERCURE_PUBLISHER_JWT_KEY={{ mercure_publisher_jwt_key }}
          MERCURE_SUBSCRIBER_JWT_KEY={{ mercure_subscriber_jwt_key }}
          MERCURE_HUB_URL=https://{{ app_domain }}/.well-known/mercure
        dest: "{{ release_path }}/.env.local"
        owner: "{{ ansible_user }}"
        group: www-data
        mode: '0640'
      become: yes

    - name: Create React .env.local for production
      ansible.builtin.copy:
        content: |
          REACT_APP_API_URL=https://{{ app_domain }}
          REACT_APP_MERCURE_HUB_URL=https://{{ app_domain }}/.well-known/mercure
        dest: "{{ release_path }}/frontend/.env.local"
        owner: "{{ ansible_user }}"
        group: www-data
        mode: '0644'
      become: yes

    - name: Ensure var directory exists and symlink log directory
      block:
        - name: Create var directory
          ansible.builtin.file:
            path: "{{ release_path }}/var"
            state: directory
            owner: "{{ ansible_user }}"
            group: www-data
            mode: '0777'

        - name: Set ACLs on release var directory
          ansible.builtin.acl:
            path: "{{ release_path }}/var"
            entity: "{{ item }}"
            etype: user
            permissions: rwx
            state: present
            recursive: yes
          loop:
            - "{{ ansible_user }}"
            - www-data

        - name: Set default ACLs on release var directory
          ansible.builtin.acl:
            path: "{{ release_path }}/var"
            entity: "{{ item }}"
            etype: user
            permissions: rwx
            state: present
            default: yes
          loop:
            - "{{ ansible_user }}"
            - www-data

        - name: Remove existing log directory if it is not a symlink
          ansible.builtin.file:
            path: "{{ release_path }}/var/log"
            state: absent
          when: not ansible_check_mode

        - name: Symlink shared log directory to release
          ansible.builtin.file:
            src: "{{ deploy_root }}/var/log"
            dest: "{{ release_path }}/var/log"
            state: link
            force: yes
      become: yes

    - name: Install Composer dependencies
      community.general.composer:
        working_dir: "{{ release_path }}"
        no_dev: yes
        optimize_autoloader: yes

    - name: Install NPM packages
      ansible.builtin.npm:
        path: "{{ release_path }}/frontend"

    - name: Build frontend assets
      ansible.builtin.shell: "npm run build"
      args:
        chdir: "{{ release_path }}/frontend"

    - name: Install Symfony assets
      ansible.builtin.shell: "php bin/console assets:install public"
      args:
        chdir: "{{ release_path }}"

    - name: Run database migrations
      ansible.builtin.shell: "php bin/console doctrine:migrations:migrate --no-interaction"
      args:
        chdir: "{{ release_path }}"

    - name: Warm up Symfony cache
      ansible.builtin.shell: "php bin/console cache:warmup"
      args:
        chdir: "{{ release_path }}"

    - name: Create atomic symlink to new release
      ansible.builtin.file:
        src: "{{ release_path }}"
        dest: "{{ current_dir }}"
        state: link

    - name: Update Caddyfile to use the new release
      ansible.builtin.template:
        src: ../ansible/roles/caddy/templates/Caddyfile.j2
        dest: /etc/caddy/Caddyfile
      notify: Reload Caddy
      become: yes

    - name: Restart PHP-FPM service
      ansible.builtin.service:
        name: php8.4-fpm.service
        state: restarted
      become: yes

    - name: Update and restart Symfony Messenger service
      ansible.builtin.template:
        src: ../ansible/roles/app_setup/templates/symfony-messenger.service.j2
        dest: /etc/systemd/system/symfony-messenger.service
      notify:
        - Reload systemd
        - Restart Symfony Messenger
      become: yes

    - name: Cleanup old releases
      ansible.builtin.shell: |
        ls -dt {{ releases_dir }}/* 2>/dev/null | tail -n +{{ keep_releases + 1 }} | xargs -r rm -rf
      when: not ansible_check_mode
      become: yes

  handlers:
    - name: Reload Caddy
      ansible.builtin.service:
        name: caddy
        state: reloaded
      become: yes

    - name: Reload systemd
      ansible.builtin.systemd:
        daemon_reload: yes
      become: yes

    - name: Restart Symfony Messenger
      ansible.builtin.service:
        name: symfony-messenger
        state: restarted
      become: yes
