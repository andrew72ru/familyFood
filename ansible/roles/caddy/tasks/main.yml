- name: Install dependencies for repository management
  apt:
    name:
      - gnupg
      - ca-certificates
      - curl
    state: present

- name: Create keyrings directory
  file:
    path: /usr/share/keyrings
    state: directory
    mode: '0755'

- name: Download Caddy GPG key
  shell: "curl -fsSL https://dl.cloudsmith.io/public/caddy/stable/gpg.key | gpg --dearmor -o /usr/share/keyrings/caddy-stable-archive-keyring.gpg"
  args:
    creates: /usr/share/keyrings/caddy-stable-archive-keyring.gpg

- name: Add or remove Caddy repository
  apt_repository:
    repo: "deb [signed-by=/usr/share/keyrings/caddy-stable-archive-keyring.gpg] https://dl.cloudsmith.io/public/caddy/stable/debian any-branch main"
    state: "{{ 'absent' if ansible_distribution_release == 'plucky' else 'present' }}"
    filename: caddy-stable

- name: Install Caddy
  apt:
    name: caddy
    state: present
    update_cache: "{{ 'yes' if ansible_distribution_release == 'plucky' else 'no' }}"

- name: Add caddy user to www-data group
  user:
    name: caddy
    groups: www-data
    append: yes
  notify: Restart Caddy

- name: Create Caddyfile
  template:
    src: Caddyfile.j2
    dest: /etc/caddy/Caddyfile
  notify: Reload Caddy

- name: Ensure Caddy is running
  service:
    name: caddy
    state: started
    enabled: yes
  ignore_errors: "{{ ansible_check_mode }}"
