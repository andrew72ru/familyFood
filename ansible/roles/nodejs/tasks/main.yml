- name: Install dependencies for repository management
  apt:
    name:
      - gnupg
      - ca-certificates
      - curl
    state: present

- name: Create keyrings directory
  file:
    path: /usr/share/keyrings
    state: directory
    mode: '0755'

- name: Download NodeSource GPG key
  shell: "curl -fsSL https://deb.nodesource.com/gpgkey/nodesource.gpg.key | gpg --dearmor -o /usr/share/keyrings/nodesource.gpg"
  args:
    creates: /usr/share/keyrings/nodesource.gpg

- name: Set distribution release for Node.js
  set_fact:
    node_dist_release: "{{ 'noble' if ansible_distribution == 'Ubuntu' and ansible_distribution_release == 'plucky' else ansible_distribution_release }}"

- name: Add or remove NodeSource repository
  apt_repository:
    repo: "deb [signed-by=/usr/share/keyrings/nodesource.gpg] https://deb.nodesource.com/node_{{ node_version }} {{ node_dist_release }} main"
    state: "{{ 'absent' if ansible_distribution_release == 'plucky' else 'present' }}"
    filename: nodesource

- name: Install Node.js
  apt:
    name:
      - nodejs
      - "{{ 'npm' if ansible_distribution_release == 'plucky' else omit }}"
    state: present
    update_cache: "{{ 'yes' if ansible_distribution_release == 'plucky' else 'no' }}"

- name: Update npm
  npm:
    name: npm
    global: yes
    state: latest
  ignore_errors: yes
  when: not ansible_check_mode
