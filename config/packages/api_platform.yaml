api_platform:
    title: Family Food
    version: 1.0.0
    show_webby: false
    enable_docs: '%kernel.debug%'
    enable_swagger_ui: '%kernel.debug%'
    enable_re_doc: '%kernel.debug%'
    defaults:
        stateless: true
        cache_headers:
            vary: [ 'Content-Type', 'Authorization', 'Origin' ]
    docs_formats:
        jsonld:
            mime_types: [ application/ld+json ]
        jsonopenapi:
            mime_types: [ application/vnd.openapi+json ]
        html:
            mime_types: [ text/html ]
        yamlopenapi:
            mime_types: [ application/vnd.openapi+yaml ]
        json:
            mime_types: [ application/json ]
    swagger:
        api_keys:
            JWT:
                name: Authorization
                type: header
