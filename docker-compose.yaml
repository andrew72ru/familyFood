services:
###> doctrine/doctrine-bundle ###
  database:
    image: postgres:${POSTGRES_VERSION:-17}-alpine
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-app}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-app-password}
      POSTGRES_USER: ${POSTGRES_USER:-app}
    healthcheck:
      test: ["CMD", "pg_isready", "-d", "${POSTGRES_DB:-app}", "-U", "${POSTGRES_USER:-app}"]
      timeout: 5s
      retries: 5
      start_period: 60s
    volumes:
      - database_data:/var/lib/postgresql/data:rw
      # You may use a bind-mounted host directory instead, so that it is harder to accidentally remove the volume and lose all your data!
      # - ./docker/db/data:/var/lib/postgresql/data:rw
###< doctrine/doctrine-bundle ###

  restore:
    image: postgres:${POSTGRES_VERSION:-17}-alpine
    depends_on:
      database:
        condition: service_healthy
    environment:
      PGHOST: database
      PGPORT: "5432"
      PGUSER: ${POSTGRES_USER:-app}
      PGPASSWORD: ${POSTGRES_PASSWORD:-app-password}
      PGDATABASE: ${POSTGRES_DB:-app}
    volumes:
      - ./.docker/dev/pgsql:/backups:ro
    entrypoint: [ "sh", "-c" ]
    command:
      - |
        set -e
        echo "Waiting for Postgres..."
        until pg_isready -h "$$PGHOST" -p "$$PGPORT" -U "$$PGUSER"; do sleep 1; done

        TABLES_COUNT=$$(psql -tAc "select count(*) from pg_tables where schemaname='public';")
        if [ "$$TABLES_COUNT" -gt 0 ]; then
          echo "Database not empty ($$TABLES_COUNT tables found), skipping restore."
          exit 0
        fi

        echo "Restoring dump..."
        pg_restore --clean --if-exists --no-owner --no-privileges -d "$$PGDATABASE" "/backups/family_food.dump"
        echo "Restore done."
    restart: no

  caddy:
    env_file:
      -  .env.local
    build:
      context: .docker/dev/caddy
    environment:
        MERCURE_PUBLISHER_JWT_KEY: "!ThisIsTheDevelopmentVariableOnlyForLocalPublisher!"
        MERCURE_SUBSCRIBER_JWT_KEY: "!ThisIsTheDevelopmentVariableOnlyForLocalSubscriber!"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - .:/srv/app
      - ./.docker/dev/caddy/Caddyfile:/etc/caddy/Caddyfile
      - caddy_data:/data
      - caddy_config:/config

###> symfony/mercure-bundle ###
  mercure:
    image: dunglas/mercure
    restart: unless-stopped
    environment:
      # Uncomment the following line to disable HTTPS,
      #SERVER_NAME: ':80'
      MERCURE_PUBLISHER_JWT_KEY: '!ChangeThisMercureHubJWTSecretKey!'
      MERCURE_SUBSCRIBER_JWT_KEY: '!ChangeThisMercureHubJWTSecretKey!'
      # Set the URL of your Symfony project (without trailing slash!) as value of the cors_origins directive
      MERCURE_EXTRA_DIRECTIVES: |
        cors_origins http://127.0.0.1:8000
    # Comment the following line to disable the development mode
    command: /usr/bin/caddy run --config /etc/caddy/dev.Caddyfile
    healthcheck:
      test: ["CMD", "curl", "-f", "https://localhost/healthz"]
      timeout: 5s
      retries: 5
      start_period: 60s
    volumes:
      - mercure_data:/data
      - mercure_config:/config
###< symfony/mercure-bundle ###

volumes:
###> doctrine/doctrine-bundle ###
  database_data:
###< doctrine/doctrine-bundle ###
  caddy_data:
  caddy_config:

###> symfony/mercure-bundle ###
  mercure_data:
  mercure_config:
###< symfony/mercure-bundle ###
